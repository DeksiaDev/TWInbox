<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TW Inbox - Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --page-bg: #EEECE6; --surface: #ffffff; --accent: #3D3FB7; --accent-hover: #4E50C9;
    --ink: #121332; --ink-secondary: #585B7A; --ink-tertiary: #9A9CB3;
    --border-strong: rgba(18,19,50,0.14); --radius: 10px; --radius-sm: 6px;
    --accent-subtle: rgba(61,63,183,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif; font-feature-settings: "ss01", "cv11";
    background: var(--page-bg); color: var(--ink);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface); border-radius: var(--radius);
    padding: 40px 36px; width: 100%; max-width: 380px;
    box-shadow: 0 2px 8px rgba(18,19,50,0.08);
  }
  .card h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.02em; }
  .dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-right: 6px; }
  .subtitle { font-size: 13px; color: var(--ink-secondary); margin-bottom: 24px; }
  label { display: block; font-size: 11px; font-weight: 500; color: var(--ink-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--ink); margin-bottom: 16px; }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-subtle); }
  .btn { width: 100%; padding: 11px; background: var(--accent); color: #F2F1EC; border: none; border-radius: 2px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { padding: 8px 12px; border-radius: var(--radius-sm); font-size: 12px; margin-bottom: 16px; display: none; }
  .msg.show { display: block; }
  .msg.success { background: #e8f5e9; color: #2e7d32; }
  .msg.error { background: #fdecea; color: #c62828; }
  .back { text-align: center; margin-top: 20px; font-size: 12px; }
  .back a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .back a:hover { text-decoration: underline; }

  /* New password form (shown after clicking email link) */
  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">
  <!-- Step 1: Request reset email -->
  <div id="request-form">
    <h1><span class="dot"></span>Reset Password</h1>
    <p class="subtitle">Enter your email and we'll send a reset link</p>
    <div class="msg" id="requestMsg"></div>
    <label>Email</label>
    <input type="email" id="resetEmail" placeholder="you@deksia.com">
    <button class="btn" id="requestBtn" onclick="requestReset()">Send Reset Link</button>
    <div class="back"><a href="/auth.html">Back to sign in</a></div>
  </div>

  <!-- Step 2: Set new password (shown when arriving from email link) -->
  <div id="update-form" class="hidden">
    <h1><span class="dot"></span>New Password</h1>
    <p class="subtitle">Enter your new password below</p>
    <div class="msg" id="updateMsg"></div>
    <label>New Password</label>
    <input type="password" id="newPw" placeholder="Min 6 characters">
    <label>Confirm Password</label>
    <input type="password" id="confirmPw" placeholder="Repeat password">
    <button class="btn" id="updateBtn" onclick="updatePassword()">Set New Password</button>
  </div>
</div>

<script>
let sb;

async function init() {
  const config = await fetch('/api/config').then(r => r.json());
  sb = supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);

  // Check if this is a password recovery redirect (has access_token in hash)
  const hash = window.location.hash;
  if (hash && hash.includes('type=recovery')) {
    // Supabase will auto-restore the session from the hash
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById('request-form').classList.add('hidden');
      document.getElementById('update-form').classList.remove('hidden');
    }
  }
}

async function requestReset() {
  const email = document.getElementById('resetEmail').value.trim();
  const msg = document.getElementById('requestMsg');
  const btn = document.getElementById('requestBtn');
  msg.classList.remove('show', 'success', 'error');

  if (!email) { showMsg(msg, 'Email required', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html',
  });

  if (error) {
    showMsg(msg, error.message, 'error');
  } else {
    showMsg(msg, 'Check your email for the reset link', 'success');
  }

  btn.disabled = false;
  btn.textContent = 'Send Reset Link';
}

async function updatePassword() {
  const pw = document.getElementById('newPw').value;
  const confirm = document.getElementById('confirmPw').value;
  const msg = document.getElementById('updateMsg');
  const btn = document.getElementById('updateBtn');
  msg.classList.remove('show', 'success', 'error');

  if (!pw || pw.length < 6) { showMsg(msg, 'Password must be at least 6 characters', 'error'); return; }
  if (pw !== confirm) { showMsg(msg, 'Passwords do not match', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: pw });

  if (error) {
    showMsg(msg, error.message, 'error');
  } else {
    showMsg(msg, 'Password updated! Redirecting...', 'success');
    setTimeout(() => { window.location.href = '/'; }, 1500);
  }

  btn.disabled = false;
  btn.textContent = 'Set New Password';
}

function showMsg(el, text, type) {
  el.textContent = text;
  el.className = `msg show ${type}`;
}

init();
</script>
</body>
</html>
